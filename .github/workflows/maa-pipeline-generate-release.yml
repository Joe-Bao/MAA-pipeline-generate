# 本工作流属于 MAA-pipeline-generator 独立仓库，不依赖上层 maa-support-extension / VS Code 扩展仓库。
#
# Release 说明：
# - push tag「maa-generate-v*」→ 会跑 build + release（创建 GitHub Release 并上传 zip）。
# - workflow_dispatch（Actions 里手动 Run）→ 只跑 build，产物在 Artifacts；不会创建 Release。
name: MAA Pipeline Generate (Portable zip)

on:
  push:
    tags:
      - 'maa-generate-v*'
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            slug: win-x64
          - os: macos-latest
            slug: darwin-arm64
          - os: ubuntu-latest
            slug: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#maa-generate-v}"
          npm pkg set version="$TAG"

      - name: Pack portable zip (Windows)
        if: runner.os == 'Windows'
        env:
          SLUG: ${{ matrix.slug }}
        run: |
          # tar.exe (libarchive) handles deep node_modules better than Compress-Archive on Windows.
          rm -rf output dist-electron .maa-gen-tmp node scripts/.dl || true
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#maa-generate-v}"
          else
            VERSION="0.0.0-SNAPSHOT"
          fi
          OUT="${GITHUB_WORKSPACE}/maa-pipeline-generate-${VERSION}-${SLUG}.zip"
          rm -f "$OUT"
          rm -f *.zip 2>/dev/null || true
          cd "$GITHUB_WORKSPACE"
          # tar.exe treats "D:..." in -f as remote "host:archive" — use a relative path (no drive letter).
          TMPZIP="../._maa-pipeline-pack-${SLUG}.zip"
          rm -f "$TMPZIP"
          tar.exe -a -c -f "$TMPZIP" \
            --exclude=output \
            --exclude=dist-electron \
            --exclude=.maa-gen-tmp \
            --exclude=node \
            --exclude=scripts/.dl \
            --exclude='*.zip' \
            .
          mv -f "$TMPZIP" "$OUT"
          ls -la "$OUT"

      - name: Pack portable zip (Unix)
        if: runner.os != 'Windows'
        env:
          SLUG: ${{ matrix.slug }}
        run: |
          rm -rf output dist-electron .maa-gen-tmp || true
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#maa-generate-v}"
          else
            VERSION="0.0.0-SNAPSHOT"
          fi
          OUT="${GITHUB_WORKSPACE}/maa-pipeline-generate-${VERSION}-${SLUG}.zip"
          rm -f "$OUT"
          zip -r "$OUT" . \
            -x "output/*" -x "output" \
            -x "dist-electron/*" -x "dist-electron" \
            -x ".maa-gen-tmp/*" -x ".maa-gen-tmp" \
            -x "node/*" -x "node" \
            -x "scripts/.dl/*" -x "scripts/.dl" \
            -x "*.zip"
          ls -la "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: maa-generate-${{ matrix.slug }}
          path: maa-pipeline-generate-*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: maa-generate-*
          merge-multiple: true

      - name: List release files
        run: find release-assets -type f

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MAA Pipeline Generate ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 手动运行时没有 tag，release job 会被跳过；在摘要里明确提示，避免误以为「CI 没发 Release」。
  manual-run-no-github-release:
    if: github.event_name == 'workflow_dispatch'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Explain artifacts vs Release
        run: |
          echo "::notice::本次为手动触发：仅生成 Artifacts（各矩阵 job 的 maa-generate-*）。不会创建 GitHub Release。"
          echo "::notice::要发布 Release：在默认分支上打 tag 并推送，例如：git tag maa-generate-v1.0.0 && git push origin maa-generate-v1.0.0"
